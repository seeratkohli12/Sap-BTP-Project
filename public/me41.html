<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME41 - RFQ Creation</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
<h2>SAP ERP > Materials Management > ME41</h2>
</div>

<div class="hero">
<h1>ME41 - Create Request for Quotation</h1>
<p>Invite approved vendors to submit quotations for required materials and services.</p>
</div>

<div class="form-box">

<input type="text" placeholder="RFQ Number">

<input type="text" placeholder="Material Code">

<input type="text" placeholder="Vendor Code">

<input type="number" placeholder="Required Quantity">

<input type="date" placeholder="Quotation Deadline">

<input type="text" placeholder="Plant Code">

<button onclick="showMsg()">Create RFQ</button>

<p id="msg" class="success">RFQ Created Successfully</p>

</div>

<div class="footer">
Amber Enterprises | Vendor Quotation Management Module
</div>

<script>
function showMsg(){
document.getElementById("msg").style.display="block";
}
</script>

</body>
</html>
